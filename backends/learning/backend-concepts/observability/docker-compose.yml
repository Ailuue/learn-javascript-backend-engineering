services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      # Allows Prometheus to reach services running on the host machine.
      # Required on Linux; Mac Docker Desktop provides this automatically.
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=1d"   # keep 1 day of data for demo

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true       # skip login for local dev
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      - prometheus

# Usage:
#   1. Start the FastAPI app:  node 03_combined.js
#   2. Start this stack:       docker compose up -d
#   3. Prometheus UI:          http://localhost:9090
#   4. Grafana UI:             http://localhost:3000  (admin / admin)
#
# Add Prometheus data source in Grafana:
#   Connections → Data Sources → Add → Prometheus
#   URL: http://prometheus:9090
#
# Useful PromQL queries to try:
#   rate(http_requests_total[1m])                               → req/s by endpoint
#   histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))  → p95 latency
#   sum(http_active_requests)                                   → in-flight requests
#   rate(http_requests_total{status=~"5.."}[1m])               → error rate
