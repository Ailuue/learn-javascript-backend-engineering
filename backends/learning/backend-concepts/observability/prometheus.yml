global:
  scrape_interval: 5s       # pull metrics every 5s (use 15s in production)
  evaluation_interval: 5s

scrape_configs:
  - job_name: "node-app"
    static_configs:
      # host.docker.internal resolves to your Mac's localhost from inside Docker.
      # This lets Prometheus (running in a container) reach the FastAPI app
      # running directly on your machine with `node 03_combined.js`.
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
