<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SSE Demo</title>
  <style>
    body { font-family: monospace; max-width: 640px; margin: 40px auto; padding: 0 20px; background: #1a1a1a; color: #d4d4d4; }
    h2 { color: #fff; }
    .hint { font-size: 0.85em; color: #888; margin-bottom: 16px; }
    .hint code { background: #2a2a2a; padding: 2px 4px; border-radius: 3px; color: #9cdcfe; }
    #events { border: 1px solid #3a3a3a; background: #111; height: 320px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    #events p { margin: 4px 0; }
    .done { color: #4ec9b0; }
    .row { display: flex; gap: 8px; margin-bottom: 10px; }
    input { flex: 1; padding: 7px 10px; background: #2a2a2a; border: 1px solid #444; color: #d4d4d4; font-family: monospace; border-radius: 4px; }
    button { padding: 7px 14px; background: #0e639c; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-family: monospace; }
    button:hover { background: #1177bb; }
    #status { font-size: 0.85em; color: #888; margin-bottom: 8px; }
    #status.streaming { color: #4ec9b0; }
  </style>
</head>
<body>
  <h2>Server-Sent Events</h2>
  <p class="hint">
    Endpoints (run <code>node 04_sse.js</code> first):<br>
    <code>http://localhost:8000/stream/temperature</code> — live sensor feed (infinite)<br>
    <code>http://localhost:8000/stream/deploy-log</code> — simulated deployment log (finite)
  </p>

  <div class="row">
    <input id="url" value="http://localhost:8000/stream/temperature" placeholder="SSE endpoint URL">
    <button onclick="startStream()">Start</button>
    <button onclick="stopStream()">Stop</button>
  </div>
  <div id="status">Not connected</div>
  <div id="events"></div>

  <script>
    let source = null;

    function log(text, cls = '') {
      const div = document.getElementById('events');
      const p = document.createElement('p');
      p.textContent = `${new Date().toLocaleTimeString()} — ${text}`;
      if (cls) p.className = cls;
      div.appendChild(p);
      div.scrollTop = div.scrollHeight;
    }

    function setStatus(text, active = false) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = active ? 'streaming' : '';
    }

    function startStream() {
      stopStream();
      const url = document.getElementById('url').value.trim();
      source = new EventSource(url);

      source.onopen = () => setStatus(`Streaming: ${url}`, true);

      // Default handler — fires for "data: ..." events with no "event:" line
      source.onmessage = (e) => log(e.data);

      // Named event listener — only fires for "event: done" events
      source.addEventListener('done', (e) => {
        log('Stream ended: ' + e.data, 'done');
        stopStream();
        setStatus('Stream finished');
      });

      source.onerror = () => setStatus('Connection error (EventSource will retry automatically)');
    }

    function stopStream() {
      if (source) {
        source.close();
        source = null;
      }
    }
  </script>
</body>
</html>
