<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebSocket Chat</title>
  <style>
    body { font-family: monospace; max-width: 640px; margin: 40px auto; padding: 0 20px; background: #1a1a1a; color: #d4d4d4; }
    h2 { color: #fff; }
    .hint { font-size: 0.85em; color: #888; margin-bottom: 16px; }
    .hint code { background: #2a2a2a; padding: 2px 4px; border-radius: 3px; color: #9cdcfe; }
    #messages { border: 1px solid #3a3a3a; background: #111; height: 320px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    #messages p { margin: 4px 0; }
    .msg-system { color: #888; font-style: italic; }
    .row { display: flex; gap: 8px; margin-bottom: 10px; }
    input { flex: 1; padding: 7px 10px; background: #2a2a2a; border: 1px solid #444; color: #d4d4d4; font-family: monospace; border-radius: 4px; }
    button { padding: 7px 14px; background: #0e639c; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-family: monospace; }
    button:hover { background: #1177bb; }
    #status { font-size: 0.85em; color: #888; margin-bottom: 8px; }
    #status.connected { color: #4ec9b0; }
  </style>
</head>
<body>
  <h2>WebSocket Chat</h2>
  <p class="hint">
    Use with <code>02_broadcast.js</code>: connect to <code>ws://localhost:8000/ws</code><br>
    Use with <code>03_rooms.js</code>: connect to <code>ws://localhost:8000/ws/general?username=alice</code>
  </p>

  <div class="row">
    <input id="url" value="ws://localhost:8000/ws" placeholder="WebSocket URL">
    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()">Disconnect</button>
  </div>
  <div id="status">Disconnected</div>
  <div id="messages"></div>
  <div class="row">
    <input id="msg" placeholder="Type a message and press Enter..." onkeydown="if(event.key==='Enter') send()">
    <button onclick="send()">Send</button>
  </div>

  <script>
    let ws = null;

    function log(text, cls = '') {
      const div = document.getElementById('messages');
      const p = document.createElement('p');
      p.textContent = text;
      if (cls) p.className = cls;
      div.appendChild(p);
      div.scrollTop = div.scrollHeight;
    }

    function setStatus(text, connected = false) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = connected ? 'connected' : '';
    }

    function connect() {
      if (ws) ws.close();
      const url = document.getElementById('url').value.trim();
      ws = new WebSocket(url);

      ws.onopen = () => {
        setStatus(`Connected: ${url}`, true);
        log(`--- connected to ${url} ---`, 'msg-system');
        document.getElementById('msg').focus();
      };

      ws.onmessage = (e) => log(e.data);

      ws.onclose = () => {
        setStatus('Disconnected');
        log('--- connection closed ---', 'msg-system');
        ws = null;
      };

      ws.onerror = () => log('--- connection error ---', 'msg-system');
    }

    function disconnect() {
      if (ws) ws.close();
    }

    function send() {
      const input = document.getElementById('msg');
      const text = input.value.trim();
      if (ws && ws.readyState === WebSocket.OPEN && text) {
        ws.send(text);
        input.value = '';
      }
    }
  </script>
</body>
</html>
