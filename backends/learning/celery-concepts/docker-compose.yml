services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Bull Board / Taskforce-style dashboards exist, but the simplest way to
  # inspect a BullMQ queue in dev is the redis-commander UI below.
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
