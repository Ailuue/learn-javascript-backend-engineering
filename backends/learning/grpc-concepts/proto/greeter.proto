syntax = "proto3";

// Used by: 01_unary.js, 05_errors_and_metadata.js, 06_interceptors.js

service Greeter {
  rpc SayHello  (HelloRequest)    returns (HelloReply);
  rpc GetUser   (GetUserRequest)  returns (User);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}

message GetUserRequest {
  int32 user_id = 1;
}

message User {
  int32  id    = 1;
  string name  = 2;
  string email = 3;
}
