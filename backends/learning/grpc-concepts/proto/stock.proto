syntax = "proto3";

// Used by: 02_server_streaming.js

service StockTicker {
  // Server streaming: client subscribes once, server pushes many price updates
  rpc StreamPrices (SubscribeRequest) returns (stream PriceUpdate);
}

message SubscribeRequest {
  string symbol = 1;
  int32  count  = 2;  // how many updates to stream before stopping
}

message PriceUpdate {
  string symbol    = 1;
  float  price     = 2;
  int64  timestamp = 3;  // unix millis
}
