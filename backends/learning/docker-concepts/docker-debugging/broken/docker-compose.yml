services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # BUG 2 — hostname is "database" but the service below is named "db".
      # Docker DNS won't resolve "database" — no such service on the network.
      # Symptom:  app crashes on first query (ENOTFOUND / getaddrinfo)
      # Find it:  docker compose logs app  ·  docker compose exec app env | grep DATABASE
      # Fix:      change "database" to "db"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # BUG 3 — init.sql is mounted to /tmp, not /docker-entrypoint-initdb.d/.
      # Postgres only auto-runs *.sql files in that specific directory on first
      # startup. Symptom: everything is "healthy", but GET /items errors with
      # 'relation "items" does not exist'.
      # Find it:  docker compose exec db ls /docker-entrypoint-initdb.d/  (empty)
      # Fix:      change /tmp/init.sql to /docker-entrypoint-initdb.d/init.sql,
      #           then: docker compose down -v && docker compose up  (fresh volume)
      - ./init.sql:/tmp/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

volumes:
  postgres_data:
