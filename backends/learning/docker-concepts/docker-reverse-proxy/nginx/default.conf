upstream app {
    # "app" is the Compose service name — Docker DNS resolves it automatically.
    # nginx talks to the app container directly on the internal Docker network.
    server app:8000;
}

server {
    listen 80;

    # Forward the real client IP to the app.
    # Without these, req.ip in Express (with trust proxy) would always be nginx's IP.
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Preserve the original Host header (e.g. "localhost") instead of "app:8000".
    proxy_set_header Host $host;

    location / {
        proxy_pass http://app;
    }
}
