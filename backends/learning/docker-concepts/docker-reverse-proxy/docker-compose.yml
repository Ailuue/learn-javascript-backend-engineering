services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80" # only nginx is exposed to the host
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

  app:
    build: .
    # No ports: mapping — NOT reachable from the host, only from the Docker
    # network (i.e. by nginx). expose: documents the port without publishing it.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
