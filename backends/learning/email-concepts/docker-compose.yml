services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP  — point nodemailer here
      - "8025:8025"   # Web UI — http://localhost:8025 to inspect sent mail
      - "1143:1143"   # IMAP  — used by 06_imap_reading.js
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      MP_ENABLE_IMAP: "true"
