services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,sns,dynamodb,lambda,iam
      - DEFAULT_REGION=us-east-1
      - LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT=60
      - DEBUG=0
    volumes:
      # Lambda runs in Docker containers, so LocalStack needs the Docker socket.
      - /var/run/docker.sock:/var/run/docker.sock
