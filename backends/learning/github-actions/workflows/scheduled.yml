# Example scheduled + manually-dispatchable workflow. Copy to .github/workflows/scheduled.yml.
name: Scheduled Health Check

on:
  schedule:
    - cron: "0 9 * * 1" # Monday 09:00 UTC (all times UTC)
  workflow_dispatch:
    inputs:
      node_version:
        description: "Node version to test against"
        type: string
        default: "22"
      dry_run:
        description: "Dry run — skip side effects"
        type: boolean
        default: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # inputs are empty on scheduled runs — supply a default with ||.
          node-version: ${{ inputs.node_version || '22' }}
          cache: npm
      - run: npm ci
      - run: npm test

      - name: Notify on failure
        if: failure()
        run: echo "Health check failed on ${{ github.repository }}"

      - name: Side effect (skipped in dry run)
        if: inputs.dry_run != 'true'
        run: echo "Running real side effects..."
