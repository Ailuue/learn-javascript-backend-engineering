# Example release workflow. Copy to .github/workflows/release.yml.
name: Release

on:
  push:
    tags:
      - "v*.*.*" # v1.2.3, v0.2.1, v1.0.0-rc.1

permissions:
  contents: write # least privilege — needed to create a GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # Final gate: prove THIS tagged commit passes before publishing.
      - run: npm test

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }} # rc/beta auto-marked
          name: Release ${{ steps.version.outputs.VERSION }}
